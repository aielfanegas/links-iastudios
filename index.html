<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MOVIL.LINKS — Mis Proyectos</title>
<style>
  :root {
    --screen-w: 402px;
    --screen-h: 874px;
  }
  html, body { margin: 0; padding: 0; background: #0d0d10; }
  * { box-sizing: border-box; }
  body {
    height: 100vh; height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .scene {
    position: fixed; inset: 0;
    background:
      radial-gradient(60% 50% at 50% 50%, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0) 60%),
      #0a0a0d;
    z-index: 0;
  }
  .stage { position: relative; z-index: 1; }
  .device { transform-origin: top left; }

  /* ── Device frame ───────────────────────────────────────── */
  .device {
    width: var(--screen-w); height: var(--screen-h);
    border-radius: 48px; overflow: hidden; position: relative;
    background: #000;
    box-shadow: 0 40px 80px rgba(0,0,0,0.18), 0 0 0 5px #fff, 0 0 0 6px rgba(0,0,0,0.12);
    font-family: -apple-system, system-ui, sans-serif;
  }
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 37px; border-radius: 24px; background: #000; z-index: 50;
  }
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; gap: 154px; align-items: center; justify-content: center;
    padding: 21px 24px 19px; width: 100%;
  }
  .statusbar > div { flex: 1; height: 22px; display: flex; align-items: center; justify-content: center; }
  .sb-time {
    font-family: -apple-system, "SF Pro", system-ui; font-weight: 590;
    font-size: 17px; line-height: 22px; color: #fff; padding-top: 1.5px;
  }
  .sb-icons { gap: 7px; padding-top: 1px; padding-right: 1px; }
  .home-indicator {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 60; height: 34px;
    display: flex; justify-content: center; align-items: flex-end;
    padding-bottom: 8px; pointer-events: none;
  }
  .home-indicator > div {
    width: 139px; height: 5px; border-radius: 100px; background: rgba(255,255,255,0.7);
  }

  /* ── Home screen ────────────────────────────────────────── */
  .home {
    width: 100%; height: 100%; position: relative; overflow: hidden;
    background: #0B1140 center / cover no-repeat url("fondopantalla.jpg");
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 80% at 80% 110%, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 50%);
  }
  .header {
    position: absolute; top: 92px; left: 0; right: 0; text-align: center;
    font-family: -apple-system, "SF Pro Display", system-ui; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.25); pointer-events: none;
  }
  .header .sub { font-size: 15px; font-weight: 600; letter-spacing: 0.4px; opacity: 0.92; text-transform: uppercase; margin-bottom: 10px; }
  .header .title { margin-top: 2px; font-size: 30px; font-weight: 700; letter-spacing: -0.3px; }

  .dots {
    position: absolute; left: 0; right: 0; bottom: 48px;
    display: flex; gap: 6px; justify-content: center; pointer-events: none;
  }
  .dots > div { width: 6px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.4); }
  .dots > div.active { background: rgba(255,255,255,0.95); }

  .hud { position: absolute; top: 68px; right: 14px; display: flex; gap: 6px; z-index: 200; }
  .hud button {
    all: unset; cursor: pointer; width: 30px; height: 30px; border-radius: 15px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 700;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .hud button.active { background: rgba(255,255,255,0.85); color: #111; }

  /* ── App tiles ──────────────────────────────────────────── */
  .tile {
    position: absolute; text-decoration: none; color: inherit;
    cursor: grab; touch-action: none;
    user-select: none; -webkit-user-select: none;
    transition: transform 200ms ease; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
  }
  .tile.dragging { cursor: grabbing; transform: scale(1.12) !important; z-index: 100;
    filter: drop-shadow(0 16px 24px rgba(0,0,0,0.35)); transition: transform 120ms ease; }
  .tile > * { pointer-events: none; }
  .tile .label {
    margin-top: 6px; font-family: -apple-system, "SF Pro Text", system-ui;
    font-size: 12px; font-weight: 500; letter-spacing: 0.1px;
    color: rgba(255,255,255,0.96); text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    text-align: center; max-width: 96px; line-height: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tile .sublabel {
    margin-top: 1px; font-family: -apple-system, system-ui;
    font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.65);
    text-shadow: 0 1px 1px rgba(0,0,0,0.3); white-space: nowrap;
  }

  .icon {
    position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.20), 0 2px 4px rgba(0,0,0,0.10), inset 0 0 0 0.5px rgba(255,255,255,0.18);
  }
  .icon .sheen {
    position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 45%);
  }
  .icon .ring {
    position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.22);
  }
  .icon .glyph { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .icon .photo { position: absolute; inset: 0; border-radius: inherit; background-size: cover; background-position: center; background-repeat: no-repeat; }

  /* folder grid */
  .folder-glass {
    position: absolute; inset: 0; border-radius: inherit;
    backdrop-filter: blur(18px) saturate(180%); -webkit-backdrop-filter: blur(18px) saturate(180%);
    background: rgba(255,255,255,0.10);
  }
  .folder-grid { position: relative; z-index: 1; display: grid; gap: 3px; align-content: center; justify-content: center; }
  .folder-cell { background: rgba(255,255,255,0.10); overflow: hidden; display: flex; align-items: center; justify-content: center; }

  /* ── Folder modal ───────────────────────────────────────── */
  .modal-root { position: absolute; inset: 0; z-index: 300; display: none; align-items: center; justify-content: center; }
  .modal-root.open { display: flex; }
  .modal-backdrop {
    position: absolute; inset: 0;
    backdrop-filter: blur(28px) saturate(140%); -webkit-backdrop-filter: blur(28px) saturate(140%);
    background: rgba(0,0,0,0.45); animation: fadeIn 240ms ease;
  }
  .modal-card {
    position: relative; z-index: 1; width: 320px; max-width: 88%;
    padding: 26px 22px 30px; border-radius: 38px;
    background: rgba(40,40,48,0.55);
    box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.18);
    animation: folderPop 280ms cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  .modal-title {
    text-align: center; margin-bottom: 22px;
    font-family: -apple-system, "SF Pro Display", system-ui;
    font-size: 22px; font-weight: 600; color: #fff; letter-spacing: -0.2px;
  }
  .modal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; justify-items: center; }
  .modal-grid a { text-decoration: none; color: #fff; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .modal-grid .label {
    margin-top: 6px; font-family: -apple-system, "SF Pro Text", system-ui;
    font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.96);
    text-shadow: 0 1px 2px rgba(0,0,0,0.35); text-align: center;
  }

  @keyframes jiggle { 0% { transform: rotate(-1deg); } 100% { transform: rotate(1deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes folderPop { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
  .jiggling .tile:not(.dragging) { animation: jiggle 0.45s infinite alternate ease-in-out; }
</style>
</head>
<body>
<div class="scene"></div>
<div class="stage">
  <div class="device">
    <div class="island"></div>
    <div class="statusbar">
      <div><span class="sb-time" id="clock">9:41</span></div>
      <div class="sb-icons">
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill="#fff"/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill="#fff"/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill="#fff"/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill="#fff"/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="#fff"/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="#fff"/>
          <circle cx="8.5" cy="10.5" r="1.5" fill="#fff"/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#fff" stroke-opacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill="#fff"/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="#fff" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>

    <div class="home" id="home" data-stage="1">
      <div class="vignette"></div>
      <div class="header">
        <div class="sub" id="today">Domingo · 24 mayo</div>
        <div class="title">Mis Proyectos</div>
      </div>
      <div class="hud">
        <button id="btn-reset" title="Restablecer posiciones">⟲</button>
      </div>
      <div class="dots" id="dots"></div>
      <!-- tiles injected here -->
      <div class="modal-root" id="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-card" id="modal-card"></div>
      </div>
    </div>

    <div class="home-indicator"><div></div></div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var SQUIRCLE = 22;       // borderRadius = size * 22%
  var SCREEN_W = 402;
  var SCREEN_H = 874;
  var LS_KEY = "movil-links-positions-v8";

  // Baked design defaults (from the design's TWEAK_DEFAULTS).
  var ICON_SIZE = 58;
  var DOCK_SIZE = 56;
  var DOT_COUNT = 4;

  // ── Icon glyphs (original brand-evocative drawings, scaled by size) ──
  var GLYPHS = {
    gobbs: function (s) {
      return svg(s * 0.62,
        '<path d="M28.5 13.5c-2.5-3-6.2-4.5-10-4C12.4 10.4 8 15.4 8 21.5 8 28 13 33 19.5 33c4.4 0 7.7-2.2 9.5-5.4" stroke="#fff" stroke-width="3.4" stroke-linecap="round" fill="none"/>' +
        '<circle cx="29.5" cy="20.8" r="3.4" fill="#fff"/>');
    },
    mirinon: function (s) {
      return '<div style="font-family:\'SF Pro Rounded\',-apple-system,system-ui;font-weight:800;font-size:' +
        (s * 0.50) + 'px;color:#fff;line-height:1;letter-spacing:-1px;text-shadow:0 1px 2px rgba(0,0,0,0.18)">m̃</div>';
    },
    ninoox: function (s) {
      return svg(s * 0.68,
        '<path d="M10 20c0-4 3-7 7-7s7 3 7 7 3 7 7 7-7-14-14-14S10 16 10 20z" stroke="#F5EFE6" stroke-width="2.6" stroke-linecap="round" fill="none"/>' +
        '<circle cx="20" cy="20" r="1.6" fill="#E8B86B"/>');
    },
    instagram: function (s) {
      return svg(s * 0.6,
        '<rect x="5" y="5" width="30" height="30" rx="9" stroke="#fff" stroke-width="3" fill="none"/>' +
        '<circle cx="20" cy="20" r="6.5" stroke="#fff" stroke-width="3" fill="none"/>' +
        '<circle cx="29" cy="11" r="2" fill="#fff"/>');
    },
    facebook: function (s) {
      return svg(s * 0.7,
        '<path d="M24 12h-2.5c-1.4 0-2.5 1.1-2.5 2.5V18h-3v4h3v10h4V22h3.2l.8-4h-4v-2.5c0-.3.2-.5.5-.5H26v-3z" fill="#fff"/>');
    },
    linkedin: function (s) {
      return svg(s * 0.62,
        '<rect x="8" y="16" width="5" height="14" rx="1" fill="#fff"/>' +
        '<circle cx="10.5" cy="11" r="2.6" fill="#fff"/>' +
        '<path d="M17 16h5v2c.9-1.5 2.6-2.4 4.5-2.4 3.6 0 5.5 2.4 5.5 6V30h-5v-7.6c0-1.8-.6-3-2.3-3-1.7 0-2.7 1.1-2.7 3V30h-5V16z" fill="#fff"/>');
    },
    tiktok: function (s) {
      var p = 'M22 7h5c.4 2.6 1.9 4.7 4 5.8v5c-2 0-3.9-.5-5.5-1.4v8.8c0 4.8-3.9 8.8-8.8 8.8-4.9 0-8.7-4-8.7-8.8s4-8.8 8.8-8.8c.5 0 1 .1 1.4.2v5.4c-.4-.2-.9-.3-1.4-.3-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.7 4-3.9V7z';
      return svg(s * 0.62,
        '<path d="' + p + '" fill="#25F4EE" transform="translate(-1.6, 1.4)"/>' +
        '<path d="' + p + '" fill="#FE2C55" transform="translate(1.6, -0.4)"/>' +
        '<path d="' + p + '" fill="#fff"/>');
    },
    youtube: function (s) {
      return svg(s * 0.7,
        '<rect x="4" y="11" width="32" height="18" rx="5" fill="#fff"/>' +
        '<path d="M17.5 16l7 4-7 4v-8z" fill="#E11D1D"/>');
    },
    ias: function (s) {
      return svg(s * 0.74,
        '<rect x="8" y="10" width="4" height="20" rx="1.2" fill="#fff"/>' +
        '<path d="M16 30l5-20h4l5 20h-4l-1-4.2h-4L20 30h-4zm6.2-7.6h2.6L23.5 17l-1.3 5.4z" fill="#fff"/>' +
        '<circle cx="32" cy="10" r="1.6" fill="#fff" opacity="0.85"/>');
    },
    whatsapp: function (s) {
      return svg(s * 0.62,
        '<path d="M6 33l2-7.2C6.7 23.7 6 21.4 6 19c0-7.2 6.3-13 14-13s14 5.8 14 13c0 7.2-6.3 13-14 13-2.4 0-4.6-.6-6.6-1.7L6 33z" fill="#fff"/>' +
        '<path d="M15 14c0-.6.4-1 1-1h1.5c.5 0 .9.3 1 .8l.7 2.7c.1.5-.1 1-.5 1.3l-1.2.8c.9 1.9 2.5 3.5 4.4 4.4l.8-1.2c.3-.4.8-.6 1.3-.5l2.7.7c.5.1.8.5.8 1V24c0 .6-.4 1-1 1-5.5 0-10-4.5-10-10z" fill="#25B65E"/>');
    },
    // DSpotGarage — original glyph: garage roofline + roller door
    dspot: function (s) {
      return svg(s * 0.7,
        '<path d="M6 19 L20 9 L34 19" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' +
        '<rect x="9" y="19" width="22" height="14" rx="1.5" stroke="#fff" stroke-width="2.6" fill="none"/>' +
        '<path d="M12 24h16M12 28h16" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>');
    }
  };

  var GRADIENTS = {
    gobbs:     "linear-gradient(155deg, #FF8A3D 0%, #E8412C 55%, #B11E5B 100%)",
    mirinon:   "linear-gradient(160deg, #2BC4A3 0%, #1F8A6E 60%, #155F4E 100%)",
    ninoox:    "linear-gradient(160deg, #1A1A1F 0%, #2D2D38 100%)",
    instagram: "linear-gradient(135deg, #FBBF24 0%, #F97316 20%, #EC4899 45%, #A855F7 75%, #4F46E5 100%)",
    facebook:  "linear-gradient(160deg, #4D9EFF 0%, #1877F2 55%, #0D5DC0 100%)",
    linkedin:  "linear-gradient(160deg, #1F8FE6 0%, #0A66C2 60%, #064E94 100%)",
    tiktok:    "linear-gradient(160deg, #111 0%, #000 100%)",
    youtube:   "linear-gradient(160deg, #FF4747 0%, #E11D1D 55%, #8E0F0F 100%)",
    ias:       "linear-gradient(160deg, #22D3EE 0%, #7C3AED 55%, #1E1B4B 100%)",
    whatsapp:  "linear-gradient(160deg, #34D26A 0%, #25B65E 55%, #0F7A3E 100%)",
    dspot:     "linear-gradient(160deg, #FFB23E 0%, #F2682C 55%, #7A2B12 100%)"
  };

  // Photo icons — when present, replace the gradient + glyph with the image.
  var IMAGES = {
    ias:     "iastudios.png",
    mirinon: "miriñon.png",
    ninoox:  "ninoox.png",
    gobbs:   "gobbs.png",
    dspot:   "dspotgarage.jpg"
  };

  function svg(dim, inner) {
    return '<svg width="' + dim + '" height="' + dim + '" viewBox="0 0 40 40" fill="none">' + inner + '</svg>';
  }

  // Build a squircle app icon DOM node.
  function makeIcon(glyphKey, size) {
    var el = document.createElement("div");
    el.className = "icon";
    el.style.width = size + "px";
    el.style.height = size + "px";
    el.style.borderRadius = (size * SQUIRCLE / 100) + "px";
    var img = IMAGES[glyphKey];
    el.style.background = img ? "#000" : GRADIENTS[glyphKey];
    if (img) {
      el.innerHTML =
        '<div class="photo" style="background-image:url(\'' + encodeURI(img) + '\')"></div>' +
        '<div class="sheen"></div><div class="ring"></div>';
    } else {
      el.innerHTML =
        '<div class="sheen"></div><div class="ring"></div>' +
        '<div class="glyph">' + GLYPHS[glyphKey](size) + '</div>';
    }
    return el;
  }

  // Build a folder icon (glass squircle + 3x3 mini-preview grid).
  function makeFolderIcon(items, size) {
    var inner = size * 0.74;
    var cell = (inner - 6) / 3;
    var el = document.createElement("div");
    el.className = "icon";
    el.style.width = size + "px";
    el.style.height = size + "px";
    el.style.borderRadius = (size * SQUIRCLE / 100) + "px";
    el.style.background = "rgba(120,120,128,0.35)";

    var glass = '<div class="folder-glass"></div>';
    var grid = '<div class="glyph"><div class="folder-grid" style="width:' + inner + 'px;height:' + inner +
      'px;grid-template-columns:repeat(3,' + cell + 'px);grid-auto-rows:' + cell + 'px;">';
    for (var i = 0; i < 9; i++) {
      var item = items[i];
      grid += '<div class="folder-cell" style="width:' + cell + 'px;height:' + cell + 'px;border-radius:' + (cell * 0.28) + 'px;">';
      if (item) grid += makeIconHTML(item.glyph, cell);
      grid += '</div>';
    }
    grid += '</div></div>';
    el.innerHTML = '<div class="ring"></div>' + glass + grid;
    return el;
  }

  // HTML string form of a squircle icon (used inside folder preview cells).
  function makeIconHTML(glyphKey, size) {
    var img = IMAGES[glyphKey];
    var bg = img ? "#000" : GRADIENTS[glyphKey];
    var head = '<div class="icon" style="width:' + size + 'px;height:' + size + 'px;border-radius:' +
      (size * SQUIRCLE / 100) + 'px;background:' + bg + ';box-shadow:none;">';
    if (img) {
      return head +
        '<div class="photo" style="background-image:url(\'' + encodeURI(img) + '\')"></div>' +
        '<div class="sheen"></div><div class="ring"></div></div>';
    }
    return head +
      '<div class="sheen"></div><div class="ring"></div>' +
      '<div class="glyph">' + GLYPHS[glyphKey](size) + '</div></div>';
  }

  // ── App / folder registry ─────────────────────────────────
  var FOLDER_CONTENTS = [
    { id: "ninoox-web", name: "ninoox.com", url: "https://ninoox.com",                glyph: "ninoox" },
    { id: "ninoox-ig",  name: "Instagram",  url: "https://instagram.com/ninooxbrand", glyph: "instagram" },
    { id: "ninoox-fb",  name: "Facebook",   url: "https://facebook.com/ninooxbrand",  glyph: "facebook" }
  ];

  var DSPOT_CONTENTS = [
    { id: "dspot-web", name: "Dspotgarage.es", url: "https://dspotgarage.es",            glyph: "dspot" },
    { id: "dspot-ig",  name: "Instagram",      url: "https://instagram.com/dspotgarage", glyph: "instagram" }
  ];

  var APPS_TOP = [
    { id: "gobbs",         name: "gobbs",       sub: "gobbs.es",   url: "https://gobbs.es",   glyph: "gobbs" },
    { id: "mirinon",       name: "miriñon",     sub: "miriñon.es", url: "https://miriñon.es", glyph: "mirinon" },
    { id: "ninoox-folder", name: "n!noox",      folder: true, contents: FOLDER_CONTENTS },
    { id: "dspot-folder",  name: "DSpotGarage", folder: true, contents: DSPOT_CONTENTS }
  ];

  var REDES_CONTENTS = [
    { id: "r-ig", name: "Instagram", url: "https://instagram.com/", glyph: "instagram" },
    { id: "r-fb", name: "Facebook",  url: "https://facebook.com/",  glyph: "facebook" },
    { id: "r-li", name: "LinkedIn",  url: "https://linkedin.com/",  glyph: "linkedin" },
    { id: "r-yt", name: "YouTube",   url: "https://youtube.com/",   glyph: "youtube" },
    { id: "r-tt", name: "TikTok",    url: "https://tiktok.com/",    glyph: "tiktok" }
  ];

  var APPS_DOCK = [
    { id: "ias",          name: "IAstudios",  url: "https://iastudios.es", glyph: "ias" },
    { id: "wa",           name: "WhatsApp",   url: "https://wa.me/",       glyph: "whatsapp" },
    { id: "redes-folder", name: "Redes",      folder: true, contents: REDES_CONTENTS }
  ];

  // ── Default positions (identical formula to the design) ───
  function defaultPositions() {
    var topY = 214;              // pushed down to clear the header
    var cx = SCREEN_W / 2;
    var g = 92;                  // 4 project tiles in a row
    var dockY = SCREEN_H - 158;
    var half = ICON_SIZE / 2;
    var dockHalf = DOCK_SIZE / 2;
    var col = function (i) { return cx + (i - 1.5) * g - half; };
    var p = {
      gobbs:           { x: col(0), y: topY },
      mirinon:         { x: col(1), y: topY },
      "ninoox-folder": { x: col(2), y: topY },
      "dspot-folder":  { x: col(3), y: topY }
    };
    // dock: web (left) · whatsapp (center) · redes folder (right)
    p.ias             = { x: cx - 120 - dockHalf, y: dockY };
    p.wa              = { x: cx       - dockHalf, y: dockY };
    p["redes-folder"] = { x: cx + 120 - dockHalf, y: dockY };
    return p;
  }

  // ── State ─────────────────────────────────────────────────
  var defaults = defaultPositions();
  var positions = loadPositions();
  var jiggling = false;

  function loadPositions() {
    var base = {};
    for (var k in defaults) base[k] = { x: defaults[k].x, y: defaults[k].y };
    try {
      var saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");
      if (saved && typeof saved === "object") {
        for (var key in saved) base[key] = saved[key];
      }
    } catch (e) {}
    return base;
  }

  function savePositions() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(positions)); } catch (e) {}
  }

  // ── Render ────────────────────────────────────────────────
  var home = document.getElementById("home");
  var modal = document.getElementById("modal");
  var modalCard = document.getElementById("modal-card");
  var device = document.querySelector(".device");
  var stage = document.querySelector(".stage");
  var tileEls = {};

  // ── Responsive fit (mobile-first) ─────────────────────────
  // Scale the fixed 402×874 frame to fill the viewport, keeping aspect
  // ratio. getBoundingClientRect() reflects the scale, so drag math
  // (scale = rect.width / SCREEN_W) keeps working untouched.
  function fit() {
    var margin = 14; // keep the white frame off the screen edges
    var s = Math.min(
      (window.innerWidth - margin) / SCREEN_W,
      (window.innerHeight - margin) / SCREEN_H
    );
    s = Math.min(s, 1); // never upscale past native size on desktop
    device.style.transform = "scale(" + s + ")";
    stage.style.width = (SCREEN_W * s) + "px";
    stage.style.height = (SCREEN_H * s) + "px";
  }
  window.addEventListener("resize", fit);
  fit();

  function renderDots() {
    var dots = document.getElementById("dots");
    var html = "";
    for (var i = 0; i < DOT_COUNT; i++) {
      html += '<div' + (i === 0 ? ' class="active"' : '') + '></div>';
    }
    dots.innerHTML = html;
  }

  function buildTile(app, isDock) {
    var size = isDock ? DOCK_SIZE : ICON_SIZE;
    var node = app.folder
      ? document.createElement("div")
      : document.createElement("a");
    node.className = "tile";
    node.style.width = size + "px";
    if (!app.folder) {
      node.href = app.url;
      node.target = "_blank";
      node.rel = "noopener noreferrer";
    }

    var iconEl = app.folder ? makeFolderIcon(app.contents, size) : makeIcon(app.glyph, size);
    node.appendChild(iconEl);

    var label = document.createElement("div");
    label.className = "label";
    label.textContent = app.name;
    node.appendChild(label);
    if (!isDock && app.sub) {
      var sub = document.createElement("div");
      sub.className = "sublabel";
      sub.textContent = app.sub;
      node.appendChild(sub);
    }

    // jiggle delay keyed off id (matches design's charCode-based stagger)
    node.style.animationDelay = ((app.id.charCodeAt(0) % 7) * 30) + "ms";

    applyPosition(node, app.id);
    attachDrag(node, app, size);
    home.insertBefore(node, modal);
    tileEls[app.id] = node;
    return node;
  }

  function applyPosition(node, id) {
    var p = positions[id] || defaults[id];
    node.style.left = p.x + "px";
    node.style.top = p.y + "px";
  }

  // ── Drag + tap behaviour ──────────────────────────────────
  function attachDrag(node, app, size) {
    var drag = null;

    node.addEventListener("pointerdown", function (e) {
      if (e.target.closest && e.target.closest("a[data-folder-link]")) return;
      e.preventDefault();
      var stageRect = home.getBoundingClientRect();
      var scale = stageRect.width / SCREEN_W;
      var p = positions[app.id] || defaults[app.id];
      drag = { sx: e.clientX, sy: e.clientY, ox: p.x, oy: p.y, scale: scale, moved: false };
      node.classList.add("dragging");
      try { node.setPointerCapture(e.pointerId); } catch (err) {}
    });

    node.addEventListener("pointermove", function (e) {
      if (!drag) return;
      var dx = (e.clientX - drag.sx) / drag.scale;
      var dy = (e.clientY - drag.sy) / drag.scale;
      if (!drag.moved && Math.abs(dx) + Math.abs(dy) > 4) drag.moved = true;
      var nx = drag.ox + dx;
      var ny = drag.oy + dy;
      var pad = 4;
      nx = Math.max(pad, Math.min(SCREEN_W - size - pad, nx));
      ny = Math.max(60, Math.min(SCREEN_H - size - 40, ny));
      positions[app.id] = { x: nx, y: ny };
      node.style.left = nx + "px";
      node.style.top = ny + "px";
    });

    function end(e) {
      if (!drag) return;
      var wasMoved = drag.moved;
      drag = null;
      node.classList.remove("dragging");
      try { node.releasePointerCapture(e.pointerId); } catch (err) {}
      savePositions();
      if (wasMoved) {
        // swallow the click that follows a drag so links don't fire
        var stop = function (ev) { ev.preventDefault(); ev.stopPropagation(); };
        window.addEventListener("click", stop, { once: true, capture: true });
      } else if (app.folder) {
        openFolder(app);
      }
    }
    node.addEventListener("pointerup", end);
    node.addEventListener("pointercancel", end);
  }

  // ── Folder modal ──────────────────────────────────────────
  function openFolder(app) {
    var html = '<div class="modal-title">' + app.name + '</div><div class="modal-grid">';
    for (var i = 0; i < app.contents.length; i++) {
      var c = app.contents[i];
      html += '<a data-folder-link="1" href="' + c.url + '" target="_blank" rel="noopener noreferrer">' +
        makeIconHTML(c.glyph, ICON_SIZE) +
        '<div class="label">' + c.name + '</div></a>';
    }
    html += '</div>';
    modalCard.innerHTML = html;
    modal.classList.add("open");
  }
  modal.addEventListener("click", function (e) {
    if (e.target === modal || e.target.classList.contains("modal-backdrop")) {
      modal.classList.remove("open");
    }
  });

  // ── HUD ───────────────────────────────────────────────────
  var btnReset = document.getElementById("btn-reset");

  btnReset.addEventListener("click", function () {
    try { localStorage.removeItem(LS_KEY); } catch (e) {}
    positions = {};
    for (var k in defaults) positions[k] = { x: defaults[k].x, y: defaults[k].y };
    for (var id in tileEls) applyPosition(tileEls[id], id);
  });

  // ── Live clock + current date (Spanish) ──────────────────
  var DIAS = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
  var MESES = ["enero", "febrero", "marzo", "abril", "mayo", "junio",
               "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
  var clockEl = document.getElementById("clock");
  var todayEl = document.getElementById("today");

  function tick() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    clockEl.textContent = h + ":" + (m < 10 ? "0" + m : m);
    todayEl.textContent = DIAS[now.getDay()] + " · " + now.getDate() + " " + MESES[now.getMonth()];
  }
  tick();
  setInterval(tick, 1000);

  // ── Boot ──────────────────────────────────────────────────
  renderDots();
  APPS_TOP.forEach(function (a) { buildTile(a, false); });
  APPS_DOCK.forEach(function (a) { buildTile(a, true); });
})();
</script>
</body>
</html>
